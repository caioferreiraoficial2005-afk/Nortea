<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 810" preserveAspectRatio="xMidYMid slice">
  <defs>

    <radialGradient id="bgMain" cx="58%" cy="42%" r="75%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#0c2a6a"/>
      <stop offset="45%"  stop-color="#05122a"/>
      <stop offset="100%" stop-color="#02070e"/>
    </radialGradient>

    <!-- Bar chart fill -->
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#1e8fff" stop-opacity="0.55"/>
      <stop offset="40%"  stop-color="#1460cc" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#0a2e80" stop-opacity="0.08"/>
    </linearGradient>

    <!-- Green line gradient -->
    <linearGradient id="greenLine" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#16C36B" stop-opacity="0.0"/>
      <stop offset="12%"  stop-color="#16C36B" stop-opacity="0.25"/>
      <stop offset="55%"  stop-color="#1ee870" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#28ff8e" stop-opacity="0.50"/>
    </linearGradient>

    <!-- Area under green line -->
    <linearGradient id="greenArea" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#16C36B" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#16C36B" stop-opacity="0.0"/>
    </linearGradient>

    <!-- Vignettes -->
    <linearGradient id="topVig" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#02070e" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#02070e" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="leftVig" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#02070e" stop-opacity="0.70"/>
      <stop offset="100%" stop-color="#02070e" stop-opacity="0.0"/>
    </linearGradient>

    <!-- Bloom filter -->
    <filter id="bloom" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="70"/>
    </filter>

    <!-- Line glow -->
    <filter id="lineGlow" x="-8%" y="-500%" width="116%" height="1100%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Node glow -->
    <filter id="nodeGlow" x="-250%" y="-250%" width="600%" height="600%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b2"/>
      <feMerge>
        <feMergeNode in="b1"/>
        <feMergeNode in="b2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Bar cap glow -->
    <filter id="capGlow" x="-80%" y="-200%" width="260%" height="600%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Streak glow -->
    <filter id="streakGlow" x="-5%" y="-1000%" width="110%" height="2100%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

  </defs>

  <!-- ─── BACKGROUND ─── -->
  <rect width="1440" height="810" fill="#02070e"/>
  <rect width="1440" height="810" fill="url(#bgMain)" opacity="0.80"/>

  <!-- ─── AMBIENT BLOOMS (reduzidos) ─── -->
  <ellipse cx="800"  cy="420" rx="530" ry="310" fill="#0b3070" opacity="0.20" filter="url(#bloom)"/>
  <ellipse cx="1180" cy="260" rx="290" ry="230" fill="#1050aa" opacity="0.14" filter="url(#bloom)"/>
  <ellipse cx="140"  cy="660" rx="270" ry="210" fill="#0a2860" opacity="0.15" filter="url(#bloom)"/>
  <ellipse cx="-30"  cy="730" rx="220" ry="165" fill="#16C36B"  opacity="0.08" filter="url(#bloom)"/>
  <ellipse cx="1500" cy="380" rx="190" ry="190" fill="#00c8f0"  opacity="0.05" filter="url(#bloom)"/>
  <ellipse cx="760"  cy="700" rx="400" ry="180" fill="#081840"  opacity="0.25" filter="url(#bloom)"/>

  <!-- ─── PARTICLES (muito sutis) ─── -->
  <g fill="#4a90ff">
    <circle cx="308" cy="124" r="1.1" opacity="0.22"/>
    <circle cx="336" cy="110" r="0.8" opacity="0.16"/>
    <circle cx="364" cy="128" r="0.9" opacity="0.20"/>
    <circle cx="392" cy="114" r="1.1" opacity="0.22"/>
    <circle cx="420" cy="131" r="0.7" opacity="0.14"/>
    <circle cx="448" cy="117" r="1.0" opacity="0.20"/>
    <circle cx="476" cy="134" r="0.8" opacity="0.16"/>
    <circle cx="504" cy="120" r="1.1" opacity="0.22"/>
    <circle cx="532" cy="137" r="0.7" opacity="0.14"/>
    <circle cx="318" cy="147" r="0.7" opacity="0.13"/>
    <circle cx="346" cy="161" r="1.0" opacity="0.18"/>
    <circle cx="374" cy="146" r="0.8" opacity="0.15"/>
    <circle cx="402" cy="163" r="1.1" opacity="0.20"/>
    <circle cx="430" cy="149" r="0.7" opacity="0.13"/>
    <circle cx="458" cy="166" r="0.9" opacity="0.17"/>
    <circle cx="486" cy="151" r="1.0" opacity="0.19"/>
    <circle cx="514" cy="168" r="0.8" opacity="0.15"/>
    <circle cx="293" cy="168" r="0.9" opacity="0.16"/>
    <circle cx="321" cy="183" r="0.7" opacity="0.13"/>
    <circle cx="349" cy="169" r="1.1" opacity="0.20"/>
    <circle cx="405" cy="171" r="1.0" opacity="0.18"/>
    <circle cx="461" cy="173" r="0.9" opacity="0.16"/>
    <circle cx="282" cy="137" r="1.6" opacity="0.24"/>
    <circle cx="548" cy="144" r="1.3" opacity="0.22"/>
    <!-- Right sparse -->
    <circle cx="875" cy="88"  r="1.0" opacity="0.12"/>
    <circle cx="935" cy="90"  r="0.9" opacity="0.10"/>
    <circle cx="995" cy="92"  r="0.7" opacity="0.10"/>
    <circle cx="890" cy="119" r="1.0" opacity="0.10"/>
    <circle cx="950" cy="122" r="1.1" opacity="0.12"/>
  </g>

  <!-- ─── BAR CHART (mais sutil) ─── -->
  <!-- Glow sombra atrás -->
  <g filter="url(#capGlow)" opacity="0.15">
    <rect x="700" y="548" width="32" height="222" rx="5" fill="#1a78ff"/>
    <rect x="744" y="506" width="32" height="264" rx="5" fill="#1a88ff"/>
    <rect x="788" y="525" width="32" height="245" rx="5" fill="#1aa0ff"/>
    <rect x="832" y="479" width="32" height="291" rx="5" fill="#1ab8ff"/>
    <rect x="876" y="436" width="32" height="334" rx="5" fill="#1accff"/>
    <rect x="920" y="396" width="32" height="374" rx="5" fill="#1adcff"/>
    <rect x="964" y="350" width="32" height="420" rx="5" fill="#20dcff"/>
    <rect x="1008" y="304" width="32" height="466" rx="5" fill="#22e4ff"/>
    <rect x="1052" y="262" width="32" height="508" rx="5" fill="#28e8ff"/>
    <rect x="1096" y="222" width="32" height="548" rx="5" fill="#30eeff"/>
    <rect x="1140" y="184" width="32" height="586" rx="5" fill="#38f2ff"/>
    <rect x="1184" y="150" width="32" height="620" rx="5" fill="#40f6ff"/>
  </g>
  <!-- Barras preenchidas -->
  <g opacity="0.28">
    <rect x="700" y="548" width="32" height="222" rx="5" fill="url(#barGrad)"/>
    <rect x="744" y="506" width="32" height="264" rx="5" fill="url(#barGrad)"/>
    <rect x="788" y="525" width="32" height="245" rx="5" fill="url(#barGrad)"/>
    <rect x="832" y="479" width="32" height="291" rx="5" fill="url(#barGrad)"/>
    <rect x="876" y="436" width="32" height="334" rx="5" fill="url(#barGrad)"/>
    <rect x="920" y="396" width="32" height="374" rx="5" fill="url(#barGrad)"/>
    <rect x="964" y="350" width="32" height="420" rx="5" fill="url(#barGrad)"/>
    <rect x="1008" y="304" width="32" height="466" rx="5" fill="url(#barGrad)"/>
    <rect x="1052" y="262" width="32" height="508" rx="5" fill="url(#barGrad)"/>
    <rect x="1096" y="222" width="32" height="548" rx="5" fill="url(#barGrad)"/>
    <rect x="1140" y="184" width="32" height="586" rx="5" fill="url(#barGrad)"/>
    <rect x="1184" y="150" width="32" height="620" rx="5" fill="url(#barGrad)"/>
  </g>
  <!-- Caps brilhantes nos topos (reduzidos) -->
  <g filter="url(#capGlow)">
    <rect x="700" y="543" width="32" height="6" rx="3" fill="#50b0ff" opacity="0.55"/>
    <rect x="744" y="501" width="32" height="6" rx="3" fill="#58bcff" opacity="0.55"/>
    <rect x="788" y="520" width="32" height="6" rx="3" fill="#60c8ff" opacity="0.55"/>
    <rect x="832" y="474" width="32" height="6" rx="3" fill="#68d0ff" opacity="0.55"/>
    <rect x="876" y="431" width="32" height="6" rx="3" fill="#72d8ff" opacity="0.55"/>
    <rect x="920" y="391" width="32" height="6" rx="3" fill="78dcff" opacity="0.55"/>
    <rect x="964" y="345" width="32" height="6" rx="3" fill="#80e0ff" opacity="0.55"/>
    <rect x="1008" y="299" width="32" height="6" rx="3" fill="#88e8ff" opacity="0.55"/>
    <rect x="1052" y="257" width="32" height="6" rx="3" fill="#92ecff" opacity="0.55"/>
    <rect x="1096" y="217" width="32" height="6" rx="3" fill="#98f0ff" opacity="0.55"/>
    <rect x="1140" y="179" width="32" height="6" rx="3" fill="#a4f4ff" opacity="0.55"/>
    <rect x="1184" y="145" width="32" height="6" rx="3" fill="#b0f8ff" opacity="0.55"/>
  </g>

  <!-- ─── CYAN STREAKS (mais sutis) ─── -->
  <path d="M -100,770 C 130,718 310,665 490,614 C 648,568 752,550 882,510 C 1002,472 1116,434 1270,390 C 1378,357 1456,340 1560,316"
    fill="none" stroke="rgba(0,220,255,0.28)" stroke-width="1.4" filter="url(#streakGlow)"/>
  <path d="M -100,770 C 130,718 310,665 490,614 C 648,568 752,550 882,510 C 1002,472 1116,434 1270,390 C 1378,357 1456,340 1560,316"
    fill="none" stroke="rgba(160,255,255,0.45)" stroke-width="0.45"/>

  <path d="M -80,706 C 170,654 340,604 508,558 C 652,516 754,500 880,462 C 1000,424 1118,384 1278,336 C 1390,300 1462,284 1560,258"
    fill="none" stroke="rgba(0,200,240,0.18)" stroke-width="1.0" filter="url(#streakGlow)"/>
  <path d="M -80,706 C 170,654 340,604 508,558 C 652,516 754,500 880,462 C 1000,424 1118,384 1278,336 C 1390,300 1462,284 1560,258"
    fill="none" stroke="rgba(120,240,255,0.35)" stroke-width="0.35"/>

  <path d="M -120,830 C 80,800 240,768 400,736 C 560,704 668,686 810,658 C 950,630 1072,598 1240,562 C 1368,534 1460,518 1560,496"
    fill="none" stroke="rgba(0,185,225,0.14)" stroke-width="0.9" filter="url(#streakGlow)"/>

  <!-- ─── GREEN TREND LINE (sutil) ─── -->
  <path d="M 50,735 C 192,695 356,646 520,594 C 662,548 762,528 904,484 C 1024,446 1128,408 1272,362 C 1374,328 1470,302 1560,280"
    fill="url(#greenArea)"/>

  <!-- Glow difuso por trás -->
  <path d="M 50,735 C 192,695 356,646 520,594 C 662,548 762,528 904,484 C 1024,446 1128,408 1272,362 C 1374,328 1470,302 1560,280"
    fill="none" stroke="#16C36B" stroke-width="7" stroke-linecap="round" opacity="0.08" filter="url(#lineGlow)"/>

  <!-- Linha principal -->
  <path d="M 50,735 C 192,695 356,646 520,594 C 662,548 762,528 904,484 C 1024,446 1128,408 1272,362 C 1374,328 1470,302 1560,280"
    fill="none" stroke="url(#greenLine)" stroke-width="2.2" stroke-linecap="round" filter="url(#lineGlow)"/>

  <!-- Nodes (menores e mais discretos) -->
  <g filter="url(#nodeGlow)">
    <circle cx="192"  cy="695" r="4"   fill="#16C36B" opacity="0.45"/>
    <circle cx="356"  cy="646" r="4.5" fill="#1cda70" opacity="0.55"/>
    <circle cx="520"  cy="594" r="4.5" fill="#1ee877" opacity="0.58"/>
    <circle cx="662"  cy="548" r="5"   fill="#22ee80" opacity="0.62"/>
    <circle cx="904"  cy="484" r="5.5" fill="#26ff8c" opacity="0.68"/>
    <circle cx="1272" cy="362" r="6"   fill="#30ffaa" opacity="0.72"/>
  </g>

  <!-- Halo apenas no node principal -->
  <circle cx="904"  cy="484" r="12" fill="none" stroke="#16C36B" stroke-width="1.0" opacity="0.25"/>
  <circle cx="904"  cy="484" r="20" fill="none" stroke="#16C36B" stroke-width="0.5" opacity="0.10"/>
  <circle cx="1272" cy="362" r="14" fill="none" stroke="#28ff90" stroke-width="1.0" opacity="0.22"/>
  <circle cx="1272" cy="362" r="24" fill="none" stroke="#28ff90" stroke-width="0.5" opacity="0.09"/>

  <!-- ─── VIGNETTES ─── -->
  <rect x="0" y="0"   width="1440" height="230" fill="url(#topVig)"/>
  <rect x="0" y="0"   width="360"  height="810" fill="url(#leftVig)"/>
</svg>
